<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ScrabbleCoach Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e12;
    --surface: #16161d;
    --surface2: #1e1e28;
    --border: #2a2a38;
    --accent: #c8a96e;
    --accent2: #7c6fcd;
    --valid: #4ade80;
    --invalid: #f87171;
    --text: #e8e6df;
    --muted: #6b6a72;
    --grid-empty: #1a1a22;
    --grid-filled: #1e2d1e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── SCREENS ── */
  .screen { display: none; flex-direction: column; flex: 1; }
  .screen.active { display: flex; }

  /* ══════════════════════════════════════════
     START SCREEN
  ══════════════════════════════════════════ */
  .start-screen {
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 40px 20px;
    gap: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(200,169,110,0.04) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(124,111,205,0.05) 0%, transparent 55%),
      var(--bg);
  }
  .start-logo {
    font-family: 'Playfair Display', serif;
    font-size: 2.6rem;
    color: var(--accent);
    letter-spacing: 0.04em;
    text-align: center;
    margin-bottom: 6px;
  }
  .start-tagline {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    text-align: center;
    margin-bottom: 56px;
  }
  .game-cards {
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .game-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 36px 32px;
    width: 300px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    flex-direction: column;
    gap: 16px;
    position: relative;
    overflow: hidden;
  }
  .game-card::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.2s;
    border-radius: 14px;
  }
  .game-card.two::before { background: radial-gradient(ellipse at top left, rgba(200,169,110,0.08), transparent 70%); }
  .game-card.three::before { background: radial-gradient(ellipse at top left, rgba(124,111,205,0.08), transparent 70%); }
  .game-card:hover { border-color: var(--accent); transform: translateY(-3px); box-shadow: 0 12px 40px rgba(0,0,0,0.4); }
  .game-card:hover::before { opacity: 1; }
  .game-card.three:hover { border-color: var(--accent2); }
  .card-badge {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 20px;
    width: fit-content;
  }
  .card-badge.two { background: rgba(200,169,110,0.12); color: var(--accent); border: 1px solid rgba(200,169,110,0.25); }
  .card-badge.three { background: rgba(124,111,205,0.12); color: var(--accent2); border: 1px solid rgba(124,111,205,0.25); }
  .card-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.7rem;
    color: var(--text);
    line-height: 1.1;
  }
  .card-desc {
    font-size: 0.82rem;
    color: var(--muted);
    line-height: 1.6;
  }
  .card-meta {
    display: flex;
    gap: 12px;
    margin-top: 4px;
  }
  .card-meta-item {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .card-meta-item .dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--muted);
    opacity: 0.4;
  }
  .card-arrow {
    font-size: 1.2rem;
    color: var(--border);
    transition: color 0.2s, transform 0.2s;
    align-self: flex-end;
  }
  .game-card:hover .card-arrow { color: var(--accent); transform: translateX(4px); }
  .game-card.three:hover .card-arrow { color: var(--accent2); }

  /* ══════════════════════════════════════════
     GAME SCREEN (shared layout)
  ══════════════════════════════════════════ */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 28px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  .header-left { display: flex; align-items: center; gap: 14px; }
  .back-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    padding: 5px 10px;
    border-radius: 5px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.05em;
  }
  .back-btn:hover { border-color: var(--accent); color: var(--accent); }
  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.05rem;
    color: var(--accent);
    letter-spacing: 0.04em;
  }
  .logo span { color: var(--muted); font-size: 0.75rem; font-family: 'DM Mono', monospace; margin-left: 8px; }
  .header-badge {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.08em;
  }

  .game-layout { display: flex; flex: 1; overflow: hidden; }
  .sidebar {
    width: 272px;
    min-width: 272px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 22px 18px;
    gap: 22px;
    overflow-y: auto;
  }
  .main { flex: 1; display: flex; flex-direction: column; padding: 26px 30px; overflow-y: auto; gap: 22px; }

  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.63rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 9px;
  }

  /* Mode buttons */
  .mode-group { display: flex; flex-direction: column; gap: 5px; }
  .mode-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    padding: 8px 12px;
    border-radius: 6px;
    cursor: pointer;
    text-align: left;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 9px;
  }
  .mode-btn:hover { border-color: var(--accent); color: var(--text); }
  .mode-btn.active { background: rgba(200,169,110,0.1); border-color: var(--accent); color: var(--accent); }

  /* Letter picker */
  .letter-picker { display: flex; flex-wrap: wrap; gap: 4px; }
  .lp-btn {
    width: 30px; height: 30px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.12s;
    display: flex; align-items: center; justify-content: center;
  }
  .lp-btn:hover { border-color: var(--accent); color: var(--accent); }
  .lp-btn.active { background: rgba(200,169,110,0.15); border-color: var(--accent); color: var(--accent); font-weight: 500; }
  .lp-btn.disabled { opacity: 0.18; pointer-events: none; }

  /* Timer */
  .timer-group { display: flex; flex-wrap: wrap; gap: 5px; }
  .timer-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    padding: 5px 9px;
    border-radius: 5px;
    cursor: pointer;
    transition: all 0.12s;
  }
  .timer-btn:hover { border-color: var(--accent2); color: var(--text); }
  .timer-btn.active { background: rgba(124,111,205,0.15); border-color: var(--accent2); color: var(--accent2); }

  /* Stats */
  .stats-mini { display: flex; flex-direction: column; gap: 7px; }
  .stat-row { display: flex; justify-content: space-between; align-items: center; font-size: 0.78rem; }
  .stat-label { color: var(--muted); }
  .stat-val { font-family: 'DM Mono', monospace; color: var(--text); font-size: 0.82rem; }
  .stat-val.green { color: var(--valid); }
  .stat-val.red { color: var(--invalid); }
  .stat-val.gold { color: var(--accent); }

  /* Action buttons */
  .action-btn {
    width: 100%; padding: 10px;
    border-radius: 6px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.83rem;
    font-weight: 500;
    cursor: pointer;
    border: none;
    transition: all 0.15s;
  }
  .btn-start { background: var(--accent); color: #0e0e12; }
  .btn-start:hover { background: #d4b87a; }
  .btn-end { background: transparent; border: 1px solid var(--border); color: var(--muted); }
  .btn-end:hover { border-color: var(--invalid); color: var(--invalid); }

  .divider { border: none; border-top: 1px solid var(--border); }

  /* ── Input area ── */
  .constraint-display {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    font-family: 'Playfair Display', serif;
    font-size: 2.6rem;
    color: var(--text);
    letter-spacing: 0.12em;
    min-height: 60px;
  }
  .constraint-display .fixed-letter { color: var(--accent); }
  .constraint-display .blank {
    color: var(--border);
    border-bottom: 3px solid var(--border);
    padding-bottom: 2px;
    min-width: 38px;
    display: inline-block;
    text-align: center;
  }

  .input-zone { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .word-input {
    background: var(--surface2);
    border: 2px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 1.8rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    text-align: center;
    padding: 12px 10px;
    border-radius: 8px;
    outline: none;
    transition: border-color 0.15s;
    caret-color: var(--accent);
  }
  .word-input-2 { width: 110px; }
  .word-input-3 { width: 150px; }
  .word-input:focus { border-color: var(--accent); }
  .word-input.flash-valid { border-color: var(--valid); animation: flashValid 0.35s ease; }
  .word-input.flash-invalid { border-color: var(--invalid); animation: flashInvalid 0.35s ease; }
  .word-input.flash-dupe { border-color: var(--accent2); animation: flashDupe 0.35s ease; }

  @keyframes flashValid { 0% { background: rgba(74,222,128,0.2); } 100% { background: var(--surface2); } }
  @keyframes flashInvalid {
    0%,25%,75% { transform: translateX(-4px); }
    50%,100% { transform: translateX(4px); }
  }
  @keyframes flashDupe { 0% { background: rgba(124,111,205,0.2); } 100% { background: var(--surface2); } }

  .feedback-msg {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    height: 18px;
    transition: opacity 0.2s;
    letter-spacing: 0.05em;
  }
  .feedback-msg.valid { color: var(--valid); }
  .feedback-msg.invalid { color: var(--invalid); }
  .feedback-msg.dupe { color: var(--accent2); }

  /* Timer bar */
  .timer-bar-wrap { width: 100%; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .timer-bar-fill { height: 100%; background: var(--accent2); transition: width 1s linear; border-radius: 2px; }
  .timer-bar-fill.urgent { background: var(--invalid); }
  .timer-display { font-family: 'DM Mono', monospace; font-size: 1.5rem; color: var(--accent2); text-align: center; letter-spacing: 0.08em; }
  .timer-display.urgent { color: var(--invalid); }

  /* Progress */
  .progress-row { display: flex; align-items: center; gap: 12px; font-size: 0.78rem; color: var(--muted); }
  .progress-bar-wrap { flex: 1; height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: var(--valid); border-radius: 3px; transition: width 0.3s ease; }
  .progress-count { font-family: 'DM Mono', monospace; color: var(--accent); white-space: nowrap; font-size: 0.8rem; }

  /* Grid */
  .grid-wrap { display: flex; flex-wrap: wrap; gap: 4px; align-content: flex-start; }
  .grid-cell {
    width: 42px; height: 42px;
    border-radius: 5px;
    border: 1px solid var(--border);
    background: var(--grid-empty);
    display: flex; align-items: center; justify-content: center;
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    letter-spacing: 0.04em;
    color: transparent;
    transition: all 0.2s;
  }
  .grid-cell.filled {
    background: var(--grid-filled);
    border-color: #2d4a2d;
    color: var(--valid);
    animation: popIn 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes popIn { 0% { transform: scale(0.7); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

  /* Invalid bank */
  .invalid-bank { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px; }
  .invalid-bank-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .invalid-pills { display: flex; flex-wrap: wrap; gap: 5px; min-height: 26px; }
  .invalid-pill {
    background: rgba(248,113,113,0.1);
    border: 1px solid rgba(248,113,113,0.3);
    color: var(--invalid);
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    padding: 3px 8px;
    border-radius: 20px;
    display: flex; align-items: center; gap: 4px;
  }
  .invalid-pill .freq { background: rgba(248,113,113,0.2); border-radius: 10px; padding: 1px 5px; font-size: 0.62rem; }
  .empty-bank { color: var(--muted); font-size: 0.75rem; font-family: 'DM Mono', monospace; }

  /* Idle */
  .not-started { flex: 1; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 10px; color: var(--muted); font-family: 'DM Mono', monospace; font-size: 0.75rem; letter-spacing: 0.08em; opacity: 0.5; }
  .not-started-icon { font-size: 2.2rem; opacity: 0.3; }

  /* ── END SCREEN ── */
  .end-screen {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(14,14,18,0.96);
    z-index: 200;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px;
    overflow-y: auto;
  }
  .end-screen.visible { display: flex; }
  .end-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 34px;
    max-width: 740px;
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 26px;
  }
  .end-title { font-family: 'Playfair Display', serif; font-size: 1.9rem; color: var(--accent); letter-spacing: 0.04em; }
  .score-big { font-family: 'DM Mono', monospace; font-size: 3.2rem; color: var(--text); line-height: 1; }
  .score-big span { font-size: 1.1rem; color: var(--muted); }
  .end-stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .end-stat { background: var(--surface2); border-radius: 8px; padding: 12px; text-align: center; }
  .end-stat .val { font-family: 'DM Mono', monospace; font-size: 1.4rem; margin-bottom: 4px; }
  .end-stat .lbl { font-size: 0.68rem; color: var(--muted); }
  .word-chips { display: flex; flex-wrap: wrap; gap: 5px; }
  .missed-chip {
    background: rgba(200,169,110,0.1);
    border: 1px solid rgba(200,169,110,0.3);
    color: var(--accent);
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    padding: 3px 9px;
    border-radius: 4px;
  }
  .end-actions { display: flex; gap: 10px; }
  .btn-play-again { background: var(--accent); color: #0e0e12; border: none; padding: 11px 26px; border-radius: 6px; font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 0.88rem; cursor: pointer; transition: background 0.15s; }
  .btn-play-again:hover { background: #d4b87a; }
  .btn-home { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 11px 26px; border-radius: 6px; font-family: 'DM Sans', sans-serif; font-size: 0.88rem; cursor: pointer; transition: all 0.15s; }
  .btn-home:hover { border-color: var(--accent2); color: var(--accent2); }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ── Flip book start card ── */
  .game-card.flip::before { background: radial-gradient(ellipse at top left, rgba(74,222,128,0.07), transparent 70%); }
  .game-card.flip:hover { border-color: var(--valid); }
  .game-card.flip:hover .card-arrow { color: var(--valid); }
  .card-badge.flip { background: rgba(74,222,128,0.1); color: var(--valid); border: 1px solid rgba(74,222,128,0.22); }

  /* ══ FLIP INDEX ══ */
  .flip-index-body { flex:1; overflow-y:auto; padding:36px 48px; display:flex; flex-direction:column; gap:28px; }
  .fb-len-toggle { display:flex; gap:8px; }
  .fb-len-btn {
    background:transparent; border:1px solid var(--border); color:var(--muted);
    font-family:'DM Mono',monospace; font-size:0.78rem; padding:7px 20px;
    border-radius:6px; cursor:pointer; transition:all 0.15s; letter-spacing:0.06em;
  }
  .fb-len-btn:hover { border-color:var(--valid); color:var(--text); }
  .fb-len-btn.active { background:rgba(74,222,128,0.1); border-color:var(--valid); color:var(--valid); }
  .fb-filter-tabs { display:flex; border:1px solid var(--border); border-radius:7px; overflow:hidden; width:fit-content; }
  .fb-tab {
    background:transparent; border:none; border-right:1px solid var(--border);
    color:var(--muted); font-family:'DM Mono',monospace; font-size:0.7rem;
    letter-spacing:0.1em; padding:8px 18px; cursor:pointer; transition:all 0.15s; text-transform:uppercase;
  }
  .fb-tab:last-child { border-right:none; }
  .fb-tab:hover { background:var(--surface2); color:var(--text); }
  .fb-tab.active { background:rgba(74,222,128,0.1); color:var(--valid); }
  .fb-breakdown { display:grid; grid-template-columns:repeat(auto-fill,minmax(86px,1fr)); gap:7px; }
  .fb-letter-cell {
    background:var(--surface); border:1px solid var(--border); border-radius:8px;
    padding:13px 8px; cursor:pointer; transition:all 0.15s;
    display:flex; flex-direction:column; align-items:center; gap:5px;
  }
  .fb-letter-cell:hover { border-color:var(--valid); background:rgba(74,222,128,0.05); transform:translateY(-2px); }
  .fb-letter-cell.empty { opacity:0.18; pointer-events:none; }
  .fb-letter-cell .fb-letter { font-family:'Playfair Display',serif; font-size:1.45rem; color:var(--text); }
  .fb-letter-cell .fb-count { font-family:'DM Mono',monospace; font-size:0.62rem; color:var(--muted); }
  .fb-all-btn {
    background:var(--surface); border:1px solid var(--border); border-radius:8px;
    padding:15px 22px; cursor:pointer; transition:all 0.15s;
    display:flex; align-items:center; justify-content:space-between;
    color:var(--text); font-family:'DM Sans',sans-serif; font-size:0.88rem; width:100%;
  }
  .fb-all-btn:hover { border-color:var(--valid); background:rgba(74,222,128,0.05); }
  .fb-all-count { font-family:'DM Mono',monospace; font-size:0.72rem; color:var(--muted); }

  /* ══ FLIP PLAYER ══ */
  .flip-player-body {
    flex:1; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:32px; padding:40px;
  }
  .flip-counter { font-family:'DM Mono',monospace; font-size:0.72rem; color:var(--muted); letter-spacing:0.1em; }

  /* Card flip mechanics */
  .flip-card-scene { width:340px; height:220px; perspective:900px; cursor:pointer; }
  .flip-card-inner {
    width:100%; height:100%;
    position:relative;
    transform-style:preserve-3d;
    transition:transform 0.42s cubic-bezier(0.4,0,0.2,1);
  }
  .flip-card-inner.flipped { transform:rotateY(180deg); }
  .flip-card-face {
    position:absolute; inset:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:var(--surface); border:1px solid var(--border); border-radius:16px;
    backface-visibility:hidden;
    -webkit-backface-visibility:hidden;
    gap:12px;
    padding:20px;
  }
  .flip-card-face.back { transform:rotateY(180deg); bord
