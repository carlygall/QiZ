<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ScrabbleCoach Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0e0e12;
  --surface: #16161d;
  --surface2: #1e1e28;
  --border: #2a2a38;
  --accent: #c8a96e;
  --accent2: #7c6fcd;
  --valid: #4ade80;
  --invalid: #f87171;
  --text: #e8e6df;
  --muted: #6b6a72;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}
.screen { display: none; min-height: 100vh; }
.screen.active { display: block; }
.screen.active.game-screen { display: flex; }
.screen.active.flip-screen { display: flex; }

/* ---- START SCREEN ---- */
#screen-home {
  min-height: 100vh;
  padding: 48px 24px;
}
.home-header {
  text-align: center;
  margin-bottom: 48px;
}
.home-title {
  font-family: 'Playfair Display', serif;
  font-size: 2.8rem;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: -0.5px;
  line-height: 1.1;
}
.home-sub {
  font-family: 'DM Mono', monospace;
  font-size: 0.78rem;
  color: var(--muted);
  margin-top: 8px;
  letter-spacing: 2px;
  text-transform: uppercase;
}
.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 20px;
  max-width: 900px;
  margin: 0 auto;
}
.game-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 32px 28px;
  cursor: pointer;
  transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s;
  position: relative;
  overflow: hidden;
}
.game-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--accent);
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.25s;
}
.game-card:hover::before { transform: scaleX(1); }
.game-card:hover {
  border-color: var(--accent);
  transform: translateY(-3px);
  box-shadow: 0 12px 32px rgba(0,0,0,0.4);
}
.card-num {
  font-family: 'DM Mono', monospace;
  font-size: 0.7rem;
  color: var(--muted);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 12px;
}
.card-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.4rem;
  color: var(--text);
  margin-bottom: 10px;
}
.card-desc {
  font-size: 0.85rem;
  color: var(--muted);
  line-height: 1.6;
}
.card-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 16px;
}
.card-tag {
  font-family: 'DM Mono', monospace;
  font-size: 0.68rem;
  padding: 3px 8px;
  border-radius: 4px;
  background: var(--surface2);
  color: var(--accent);
  border: 1px solid var(--border);
  letter-spacing: 0.5px;
}

/* ---- SHARED GAME LAYOUT ---- */
.game-screen {
  height: 100vh;
  flex-direction: column;
}
.game-header {
  height: 56px;
  min-height: 56px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 16px;
  flex-shrink: 0;
}
.btn-back {
  background: none;
  border: 1px solid var(--border);
  color: var(--muted);
  padding: 6px 14px;
  border-radius: 6px;
  cursor: pointer;
  font-family: 'DM Mono', monospace;
  font-size: 0.75rem;
  letter-spacing: 0.5px;
  transition: color 0.2s, border-color 0.2s;
}
.btn-back:hover { color: var(--text); border-color: var(--muted); }
.game-header-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.1rem;
  color: var(--text);
  flex: 1;
}
.header-badge {
  font-family: 'DM Mono', monospace;
  font-size: 0.7rem;
  padding: 3px 10px;
  border-radius: 20px;
  background: var(--surface2);
  color: var(--accent);
  border: 1px solid var(--border);
}
.game-body {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ---- SIDEBAR ---- */
.sidebar {
  width: 240px;
  min-width: 240px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.sidebar-sm {
  width: 220px;
  min-width: 220px;
}
.sidebar-section label {
  font-family: 'DM Mono', monospace;
  font-size: 0.68rem;
  color: var(--muted);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  display: block;
  margin-bottom: 8px;
}
.mode-btn-group {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.mode-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--muted);
  padding: 7px 12px;
  border-radius: 6px;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.82rem;
  text-align: left;
  transition: all 0.15s;
}
.mode-btn:hover { color: var(--text); border-color: var(--muted); }
.mode-btn.active {
  background: var(--accent);
  color: #0e0e12;
  border-color: var(--accent);
  font-weight: 600;
}
.letter-picker {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 3px;
}
.lp-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--muted);
  padding: 5px 2px;
  border-radius: 4px;
  cursor: pointer;
  font-family: 'DM Mono', monospace;
  font-size: 0.72rem;
  text-align: center;
  transition: all 0.15s;
}
.lp-btn:hover:not(:disabled) { color: var(--text); border-color: var(--muted); }
.lp-btn.active { background: var(--accent2); color: #fff; border-color: var(--accent2); }
.lp-btn:disabled { opacity: 0.25; cursor: not-allowed; }
.timer-group {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4px;
}
.timer-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--muted);
  padding: 6px 4px;
  border-radius: 6px;
  cursor: pointer;
  font-family: 'DM Mono', monospace;
  font-size: 0.75rem;
  text-align: center;
  transition: all 0.15s;
}
.timer-btn:hover { color: var(--text); border-color: var(--muted); }
.timer-btn.active { background: var(--accent2); color: #fff; border-color: var(--accent2); }
.stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}
.stat-box {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 8px 10px;
}
.stat-val {
  font-family: 'DM Mono', monospace;
  font-size: 1.2rem;
  color: var(--accent);
}
.stat-lbl {
  font-family: 'DM Mono', monospace;
  font-size: 0.6rem;
  color: var(--muted);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-top: 2px;
}
.btn-primary {
  width: 100%;
  padding: 10px;
  background: var(--accent);
  color: #0e0e12;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.88rem;
  font-weight: 600;
  transition: opacity 0.2s;
}
.btn-primary:hover { opacity: 0.88; }
.btn-secondary {
  width: 100%;
  padding: 10px;
  background: none;
  color: var(--invalid);
  border: 1px solid var(--invalid);
  border-radius: 8px;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.88rem;
  transition: all 0.15s;
}
.btn-secondary:hover { background: rgba(248,113,113,0.1); }
.timer-display {
  font-family: 'DM Mono', monospace;
  font-size: 1.5rem;
  color: var(--accent);
  text-align: center;
  padding: 6px;
}
.timer-display.warning { color: var(--invalid); animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

/* ---- MAIN GAME AREA ---- */
.main-area {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}
.constraint-display {
  display: flex;
  gap: 8px;
  align-items: center;
  justify-content: center;
  margin: 8px 0;
}
.letter-tile {
  width: 52px;
  height: 52px;
  background: var(--surface);
  border: 2px solid var(--border);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Playfair Display', serif;
  font-size: 1.6rem;
  font-weight: 700;
}
.letter-tile.fixed { border-color: var(--accent); color: var(--accent); }
.letter-tile.blank { color: var(--muted); }
.letter-tile.contains-label {
  width: auto;
  padding: 0 16px;
  font-size: 0.8rem;
  font-family: 'DM Mono', monospace;
  color: var(--muted);
  border-style: dashed;
}
.input-zone {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}
.word-input {
  width: 140px;
  height: 56px;
  background: var(--surface);
  border: 2px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  font-family: 'Playfair Display', serif;
  font-size: 1.8rem;
  font-weight: 700;
  text-align: center;
  letter-spacing: 4px;
  outline: none;
  transition: border-color 0.2s;
}
.word-input:focus { border-color: var(--accent2); }
.word-input.flash-valid { border-color: var(--valid); animation: flashValid 0.3s; }
.word-input.flash-invalid { border-color: var(--invalid); animation: shake 0.3s; }
.word-input.flash-dup { border-color: var(--accent2); animation: flashDup 0.3s; }
@keyframes flashValid { 0%{background:rgba(74,222,128,0.2)} 100%{background:var(--surface)} }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
@keyframes flashDup { 0%{background:rgba(124,111,205,0.3)} 100%{background:var(--surface)} }
.feedback-line {
  font-family: 'DM Mono', monospace;
  font-size: 0.75rem;
  height: 18px;
  color: var(--muted);
  text-align: center;
  transition: color 0.2s;
}
.progress-bar-wrap {
  width: 100%;
  height: 6px;
  background: var(--surface2);
  border-radius: 3px;
  overflow: hidden;
}
.progress-bar-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 3px;
  transition: width 0.3s;
}
.progress-label {
  font-family: 'DM Mono', monospace;
  font-size: 0.72rem;
  color: var(--muted);
  text-align: right;
  margin-top: 4px;
}
.word-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.wg-cell {
  font-family: 'Playfair Display', serif;
  font-size: 0.9rem;
  font-weight: 600;
  padding: 5px 10px;
  border-radius: 6px;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: transparent;
  transition: all 0.25s;
  min-width: 42px;
  text-align: center;
}
.wg-cell.found {
  background: rgba(74,222,128,0.15);
  border-color: var(--valid);
  color: var(--valid);
  animation: popIn 0.2s;
}
.wg-cell.missed {
  background: rgba(248,113,113,0.1);
  border-color: var(--invalid);
  color: var(--invalid);
}
@keyframes popIn { 0%{transform:scale(0.7);opacity:0} 100%{transform:scale(1);opacity:1} }
.section-label {
  font-family: 'DM Mono', monospace;
  font-size: 0.68rem;
  color: var(--muted);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.invalid-bank {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
}
.inv-pill {
  font-family: 'DM Mono', monospace;
  font-size: 0.72rem;
  padding: 3px 8px;
  border-radius: 4px;
  background: rgba(248,113,113,0.1);
  border: 1px solid rgba(248,113,113,0.3);
  color: var(--invalid);
}

/* ---- END MODAL ---- */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(14,14,18,0.88);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 100;
  padding: 20px;
}
.modal-overlay.active { display: flex; }
.modal-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 36px;
  max-width: 520px;
  width: 100%;
  max-height: 90vh;
  overflow-y: auto;
}
.modal-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.8rem;
  color: var(--accent);
  margin-bottom: 6px;
}
.modal-score {
  font-family: 'DM Mono', monospace;
  font-size: 2.2rem;
  color: var(--text);
  margin-bottom: 20px;
}
.modal-stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  margin-bottom: 24px;
}
.modal-stat { text-align: center; }
.modal-stat-val {
  font-family: 'DM Mono', monospace;
  font-size: 1.2rem;
  color: var(--text);
}
.modal-stat-lbl {
  font-family: 'DM Mono', monospace;
  font-size: 0.6rem;
  color: var(--muted);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-top: 3px;
}
.chip-row {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 16px;
}
.chip {
  font-family: 'Playfair Display', serif;
  font-size: 0.88rem;
  font-weight: 600;
  padding: 4px 12px;
  border-radius: 6px;
}
.chip-missed { background: rgba(200,169,110,0.15); border: 1px solid var(--accent); color: var(--accent); }
.chip-invalid { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.3); color: var(--invalid); }
.chip-found { background: rgba(74,222,128,0.12); border: 1px solid var(--valid); color: var(--valid); }
.modal-actions {
  display: flex;
  gap: 10px;
  margin-top: 24px;
}
.btn-modal-primary {
  flex: 1;
  padding: 10px;
  background: var(--accent);
  color: #0e0e12;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  font-weight: 600;
  font-size: 0.9rem;
  transition: opacity 0.2s;
}
.btn-modal-primary:hover { opacity: 0.88; }
.btn-modal-sec {
  flex: 1;
  padding: 10px;
  background: none;
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 8px;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.9rem;
  transition: border-color 0.2s;
}
.btn-modal-sec:hover { border-color: var(--muted); }
.divider {
  height: 1px;
  background: var(--border);
  margin: 16px 0;
}

/* ---- FLIP BOOK ---- */
.flip-index {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
}
.flip-player { display: none; flex: 1; flex-direction: column; align-items: center; padding: 24px; }
.flip-player.visible { display: flex; }
.length-toggle {
  display: flex;
  gap: 0;
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  margin-bottom: 24px;
  align-self: flex-start;
}
.lt-btn {
  padding: 8px 20px;
  background: none;
  border: none;
  color: var(--muted);
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.85rem;
  transition: all 0.15s;
  border-right: 1px solid var(--border);
}
.lt-btn:last-child { border-right: none; }
.lt-btn.active { background: var(--accent); color: #0e0e12; font-weight: 600; }
.filter-tabs {
  display: flex;
  gap: 4px;
  margin-bottom: 20px;
}
.ftab {
  padding: 6px 16px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--muted);
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.82rem;
  transition: all 0.15s;
}
.ftab.active { background: var(--accent2); color: #fff; border-color: var(--accent2); }
.btn-browse-all {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 10px 20px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.88rem;
  transition: border-color 0.2s;
  margin-bottom: 24px;
}
.btn-browse-all:hover { border-color: var(--accent); }
.btn-browse-all span {
  font-family: 'DM Mono', monospace;
  font-size: 0.72rem;
  color: var(--muted);
}
.letter-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
  gap: 8px;
}
.lg-tile {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 8px;
  cursor: pointer;
  text-align: center;
  transition: all 0.15s;
}
.lg-tile:hover:not(.empty) { border-color: var(--accent); }
.lg-tile.empty { opacity: 0.3; cursor: not-allowed; }
.lg-tile-letter {
  font-family: 'Playfair Display', serif;
  font-size: 1.2rem;
  font-weight: 700;
  color: var(--text);
}
.lg-tile-count {
  font-family: 'DM Mono', monospace;
  font-size: 0.65rem;
  color: var(--muted);
  margin-top: 2px;
}
.hooks-word-tile {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 8px;
  cursor: pointer;
  text-align: center;
  transition: all 0.15s;
}
.hooks-word-tile:hover:not(.empty) { border-color: var(--accent); }
.hooks-word-tile.empty { opacity: 0.3; cursor: not-allowed; }
.hwt-word {
  font-family: 'Playfair Display', serif;
  font-size: 1rem;
  font-weight: 700;
  color: var(--text);
}
.hwt-count {
  font-family: 'DM Mono', monospace;
  font-size: 0.62rem;
  color: var(--muted);
  margin-top: 2px;
}

/* Flip player */
.flip-pos {
  font-family: 'DM Mono', monospace;
  font-size: 0.78rem;
  color: var(--muted);
  margin-bottom: 8px;
  align-self: stretch;
  text-align: center;
}
.flip-progress-wrap {
  width: 100%;
  max-width: 400px;
  height: 4px;
  background: var(--surface2);
  border-radius: 2px;
  overflow: hidden;
  margin-bottom: 32px;
}
.flip-progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  transition: width 0.3s;
}
.card-scene {
  width: 320px;
  height: 200px;
  perspective: 800px;
  margin-bottom: 32px;
}
.card-face-wrapper {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.45s cubic-bezier(0.4,0,0.2,1);
  cursor: pointer;
}
.card-face-wrapper.flipped { transform: rotateY(180deg); }
.card-face {
  position: absolute;
  inset: 0;
  backface-visibility: hidden;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.card-face.back { transform: rotateY(180deg); }
.card-word-large {
  font-family: 'Playfair Display', serif;
  font-size: 3.5rem;
  font-weight: 700;
  color: var(--text);
}
.card-hint {
  font-family: 'DM Mono', monospace;
  font-size: 0.65rem;
  color: var(--muted);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-top: 6px;
}
.card-word-small {
  font-family: 'Playfair Display', serif;
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--muted);
  margin-bottom: 12px;
}
.hooks-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  justify-content: center;
}
.hook-chip {
  font-family: 'DM Mono', monospace;
  font-size: 0.78rem;
  padding: 3px 8px;
  border-radius: 4px;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
}
.hook-chip .hl { color: var(--accent); font-weight: 700; }
.flip-nav {
  display: flex;
  gap: 16px;
  align-items: center;
}
.flip-nav-btn {
  width: 48px;
  height: 48px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 50%;
  cursor: pointer;
